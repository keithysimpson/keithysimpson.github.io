<!--
APP BRIEF:
A minimal, mobile-first web app to display the history of various events (e.g. start of life on Earth, dinosaurs, modern humans, printing press, etc.). To be hosted on GitHub Pages as a single HTML file.

Inspired and based heavily on "https://waitbutwhy.com/2013/08/putting-time-in-perspective.html"

Layout
- A fixed vertical timeline rail runs down the left side of the screen
- "Today" is always anchored at the bottom of the rail with a glowing dot and label
- The top of the rail always represents the start of the current zoom level (e.g. Big Bang for level 1, Earth formation for level 2, etc.)
- The rail never scrolls — it always fills the visible screen height
- Event cards are listed to the right of the rail and are independently scrollable

Navigation / Zoom

- A slider at the top controls the zoom level
- Notch labels below the slider show the time span at each stop

Timeline Rail

- Each event is represented by a coloured dot on the rail, positioned proportionally to its true position in time within the current zoom window
- When changing zoom level, dots animate smoothly to their new scaled positions via CSS transitions (top property, 500ms, ease-in-out cubic bezier)
- Dots leaving the visible range slide to the top of the rail before fading out; dots entering slide in from the top

Event Cards

- Each card shows: time label, event name, short description
- Cards are stacked vertically and nudged apart to avoid overlap
- Cards animate position in sync with their corresponding rail dot


-->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline</title>



  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    #app {
      /*font-family: var(--font-sans);*/
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #e8e6df;
      height: 100vh;
      /* max-width: 420px; */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 12px 16px 8px;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .header-top {
      margin-bottom: 8px;
    }

    .level-name {
      font-size: 14px;
      font-weight: 500;
      color: #000000;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .nav-btn {
      font-size: 12px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.55);
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      background: none;
      border: none;
      font-family: inherit;
    }

    .nav-btn:hover {
      color: rgba(0, 0, 0, 0.85);
      background: rgba(0, 0, 0, 0.06);
    }

    .nav-btn:active {
      background: rgba(0, 0, 0, 0.10);
    }

    .nav-btn.disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .zoom-dots-track {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      height: 28px;
      min-width: 0;
    }

    .zoom-dots-line {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      height: 3px;
      background: rgba(48, 47, 47, 0.20);
      transform: translateY(-50%);
      border-radius: 2px;
      pointer-events: none;
    }

    .zoom-dots-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
      position: relative;
      z-index: 1;
    }

    .zoom-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      user-select: none;
      border: 2px solid transparent;
    }

    .zoom-dot:hover {
      transform: scale(1.2);
    }

    .zoom-dot.active {
      width: 28px;
      height: 28px;
      font-size: 11px;
      border-color: rgba(100, 140, 255, 0.7);
      box-shadow: 0 0 8px rgba(100, 140, 255, 0.5);
      transform: scale(1.15);
    }

    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .rail-col {
      width: 100px;
      flex-shrink: 0;
      position: relative;
    }

    .rail-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 24px;
      width: 1.5px;
      transform: translateX(-50%);
      background: rgb(0, 0, 0);
      box-shadow: 0px 0px 20px 2px rgb(148, 148, 148);
      z-index: 2;
    }

    .level-bg-layer {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 24px;
      width: 100%;
      transform: translateX(-50%);
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .level-bg {
      position: absolute;
      left: 0;
      width: 100%;
      transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1), height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .now-dot {
      position: absolute;
      bottom: 18px;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #648cff;
      border: 2px solid rgba(100, 140, 255, 0.5);
      transform: translateX(-50%);
      box-shadow: 0 0 8px rgba(100, 140, 255, 0.6);
      z-index: 4;
    }

    .today-lbl {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgb(9, 56, 196);
    }

    .rail-dot {
      position: absolute;
      left: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      cursor: pointer;
      transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
    }

    .rail-dot.milestone {
      background: #ffc86b;
    }

    .rail-dot.epoch {
      background: #5dcaa5;
    }

    .rail-dot.default {
      background: #648cff;
    }

    .rail-period {
      position: absolute;
      left: calc(50% + 2px);
      width: 4px;
      z-index: 3;
      cursor: pointer;
      transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1), height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
    }

    .rail-period.milestone {
      background: #ffc86b;
    }

    .rail-period.epoch {
      background: #5dcaa5;
    }

    .rail-period.default {
      background: #648cff;
    }

    .conn-line {
      position: absolute;
      height: 1px;
      left: 22px;
      width: 16px;
      background: rgba(255, 255, 255, 0.12);
      pointer-events: none;
      transform: translateY(-50%);
      transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
    }

    /* SVG overlay for connector lines between rail dots and event labels */
    #connectors-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: visible;
    }

    #connectors-svg path {
      fill: none;
      stroke-width: 1.5;
      opacity: 0.5;
    }

    .events-col {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }

    .events-col::-webkit-scrollbar {
      display: none;
    }

    .events-inner {
      position: relative;
      padding: 0 12px 60px 4px;
    }

    .event-item {
      position: absolute;
      left: 4px;
      right: 12px;
      transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
    }

    .ev-time {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: rgba(66, 66, 66, 0.28);
      margin-bottom: 1px;
      text-transform: uppercase;
    }

    .ev-name {
      font-size: 12px;
      font-weight: 500;
      color: #000000;
      line-height: 1.3;
    }

    .ev-desc {
      font-size: 10px;
      color: rgba(57, 57, 57, 0.35);
      line-height: 1.4;
      margin-top: 1px;
    }

    .ev-divider {
      position: absolute;
      left: 4px;
      right: 12px;
      height: 0.5px;
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .rail-tick {
      position: absolute;
      left: 0;
      width: 50%;
      height: 0;
      border-top: 1px solid rgba(0, 0, 0, 0.15);
      transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
      pointer-events: none;
      z-index: 1;
    }

    .rail-tick-label {
      position: absolute;
      left: 6px;
      bottom: 2px;
      font-size: 9px;
      color: rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }
  </style>

</head>

<body>
  <div id="app">
    <div class="header">
      <div class="header-top">
        <span class="level-name" id="level-name">Universe · 13.8 billion years</span>
      </div>
      <div class="slider-row">
        <button class="nav-btn" id="nav-back">&lt; Back</button>
        <div class="zoom-dots-track">
          <div class="zoom-dots-line"></div>
          <div class="zoom-dots-container" id="zoom-dots"></div>
        </div>
        <button class="nav-btn" id="nav-forward">Forward &gt;</button>
      </div>
    </div>
    <div class="body" id="body">
      <div class="rail-col" id="rail-col">
        <div class="level-bg-layer" id="level-bg-layer"></div>
        <div class="rail-line"></div>
        <div class="now-dot"></div>
        <div class="today-lbl">Today</div>
      </div>
      <div class="events-col" id="events-col">
        <div class="events-inner" id="events-inner"></div>
      </div>
      <svg id="connectors-svg"></svg>
    </div>
  </div>

  <script>
    // Definitions for each zoom level: name, time span, starting "years ago" (start_ya), and background color
    const LEVELS = [
      { name: "Universe", span: "13.8 billion years", start_ya: 13.8e9, color: "#e3e3e3" },
      { name: "Earth", span: "4.6 billion years", start_ya: 4.6e9, color: "#cdf0ff" },
      { name: "Life on Earth", span: "3.8 billion years", start_ya: 3.8e9, color: "#e1f5c4" },
      { name: "Complex life", span: "540 million years", start_ya: 540e6, color: "#bfe3bc" },
      { name: "Age of Dinosaurs", span: "230 million years", start_ya: 230e6, color: "#69ea5eff" },
      { name: "Age of Mammals", span: "65 million years", start_ya: 65e6, color: "#bfe3bc" },
      { name: "Human prehistory", span: "300,000 years", start_ya: 300e3, color: "#ffeccc" },
      { name: "Civilisation", span: "12,000 years", start_ya: 12e3, color: "#ffe2cc" },
      { name: "Recorded history", span: "3,500 years", start_ya: 3.5e3, color: "#ffcccc" },
      { name: "Common era", span: "2,000 years", start_ya: 2e3, color: "#ffc4c4" },
      { name: "Last 500 years", span: "500 years", start_ya: 500, color: "#ecc4ff" },
      { name: "Last 250 years", span: "250 years", start_ya: 250, color: "#d9c4ff" },
      { name: "Last 100 years", span: "100 years", start_ya: 100, color: "#c4d1ff" },
      { name: "Last 50 years", span: "50 years", start_ya: 50, color: "#c4e8ff" },
      { name: "Last 25 years", span: "25 years", start_ya: 25, color: "#c4fffa" },
    ];

    // (Notch labels removed — replaced by numbered dots)

    // The complete list of data points to display on the timeline. Supports points in time and periods.
    const ALL_EVENTS = [
      { ya: 13.8e9, name: "Big Bang", time: "13.8 bya", desc: "Origin of space, time and matter", type: "milestone" },
      { ya: 13.6e9, name: "First stars", time: "13.6 bya", desc: "Hydrogen ignites across the universe", type: "epoch" },
      { ya: 9e9, name: "Milky Way forms", time: "9 bya", desc: "Our galaxy coalesces from gas", type: "epoch" },
      { ya: 4.6e9, name: "Earth forms", time: "4.6 bya", desc: "Solar system dust gathers into a planet", type: "milestone" },
      { ya: 4.5e9, name: "Moon forms", time: "4.5 bya", desc: "Giant impact sends debris into orbit", type: "epoch" },
      { ya: 3.8e9, name: "First life", time: "3.8 bya", desc: "Single-celled organisms in the oceans", type: "milestone" },
      { ya: 2.4e9, name: "Great Oxygenation", time: "2.4 bya", desc: "Photosynthesis transforms the atmosphere", type: "milestone" },
      { ya: 2e9, name: "Eukaryotes", time: "2 bya", desc: "Cells with a nucleus appear", type: "epoch" },
      { ya: 700e6, name: "Multicellular life", time: "700 mya", desc: "Complex organisms emerge", type: "epoch" },
      { ya: 540e6, name: "Cambrian explosion", time: "540 mya", desc: "Rapid diversification of animal life", type: "milestone" },
      { ya: 375e6, name: "Life onto land", time: "375 mya", desc: "Tetrapods crawl from water to shore", type: "epoch" },
      { ya: 230e6, end_ya: 66e6, name: "Dinosaurs", time: "230–66 mya", desc: "Reign of the dinosaurs begins", type: "epoch" },
      { ya: 66e6, name: "Mass extinction", time: "66 mya", desc: "Asteroid ends the dinosaur era", type: "milestone" },
      { ya: 25e6, name: "First apes", time: "25 mya", desc: "Primates diverge into Old World monkeys and apes", type: "epoch" },
      { ya: 6e6, name: "Hominin split", time: "6 mya", desc: "Human and chimp lineages diverge", type: "epoch" },
      { ya: 300e3, name: "Homo sapiens", time: "300,000 ya", desc: "Modern humans evolve in Africa", type: "milestone" },
      { ya: 70e3, name: "Out of Africa", time: "70,000 ya", desc: "Humans migrate across the globe", type: "milestone" },
      { ya: 12e3, name: "Agriculture", time: "12,000 ya", desc: "Farming replaces hunter-gathering", type: "milestone" },
      // stone age
      { cal_year: -12e3, end_cal_year: -3e3, name: "Stone Age", time: "12,000–3,000 BCE", desc: "Stone Age", type: "epoch", color: "#999999" },
      // bronze age
      { cal_year: -3e3, end_cal_year: -1.2e3, name: "Bronze Age", time: "3,000–1,200 BCE", desc: "Bronze Age", type: "epoch", color: "#ffbb00" },
      // iron age
      { cal_year: -1.2e3, end_cal_year: -500, name: "Iron Age", time: "1,200–500 BCE", desc: "Iron Age", type: "epoch" },
      { cal_year: -5000, name: "Writing", time: "5,000 ya", desc: "Sumerian cuneiform; recorded history begins", type: "milestone" },
      // stonehenge
      { cal_year: -5000, name: "Stonehenge", time: "5,000 ya", desc: "Stonehenge", type: "milestone" },
      // great pyramid of giza
      { cal_year: -4500, name: "Great Pyramid of Giza", time: "4,500 ya", desc: "Great Pyramid of Giza", type: "milestone" },
      // ancient greece
      { cal_year: -800, end_cal_year: -146, name: "Ancient Greece", time: "800–146 BCE", desc: "Philosophy, democracy, and art", type: "milestone", color: "#00ff00", offset: 1 },
      // roman empire
      { cal_year: 27, end_cal_year: 476, name: "Roman Empire", time: "27 - 476 CE", desc: "Conquest and engineering", type: "milestone", color: "#ff0000", offset: 1 },
      { cal_year: 1440, name: "Printing press", time: "1440 CE", desc: "Gutenberg democratises knowledge", type: "milestone" },
      { cal_year: 1687, name: "Newton's Principia", time: "1687 CE", desc: "Laws of motion; modern science begins", type: "epoch" },
      { cal_year: 1760, end_cal_year: 1840, name: "Industrial revolution", time: "1760s CE", desc: "Steam power transforms civilisation", type: "milestone" },
      { cal_year: 1850, name: "Germ theory", time: "~1850 CE", desc: "Disease explained; medicine transformed", type: "epoch" },
      { cal_year: 1903, name: "Powered flight", time: "1903 CE", desc: "Wright brothers' first flight", type: "milestone" },
      { cal_year: 1914, end_cal_year: 1918, name: "World War I", time: "1914–18", desc: "Major global conflict", type: "milestone" },
      { cal_year: 1939, end_cal_year: 1945, name: "World War II", time: "1939–45", desc: "Major global conflict", type: "milestone" },
      { cal_year: 1945, name: "Nuclear age", time: "1945 CE", desc: "Atomic bomb; the Cold War begins", type: "epoch" },
      { cal_year: 1969, name: "Moon landing", time: "1969 CE", desc: "Humans walk on another world", type: "milestone" },
      { cal_year: 1991, name: "World Wide Web", time: "1991 CE", desc: "Berners-Lee connects global knowledge", type: "milestone" },
      { cal_year: 2007, name: "Smartphones", time: "2007 CE", desc: "The internet fits in your pocket", type: "epoch" },
      { cal_year: 2020, name: "COVID-19", time: "2020 CE", desc: "Global pandemic halts modern life", type: "milestone" },
      { cal_year: 2022, name: "AI goes mainstream", time: "2022–23 CE", desc: "Large language models reshape culture", type: "milestone" },
    ];

    // Convert all calendar year formats (cal_year) into "years ago" (ya) based on the current year
    const currentYearGlobal = new Date().getFullYear();
    ALL_EVENTS.forEach(e => {
      if (typeof e.ya === 'undefined' && typeof e.cal_year !== 'undefined') {
        e.ya = currentYearGlobal - e.cal_year;
      }
      if (typeof e.end_ya === 'undefined' && typeof e.end_cal_year !== 'undefined') {
        e.end_ya = currentYearGlobal - e.end_cal_year;
      }
    });

    let currentLevel = 0;

    // Dynamically calculate what increment of years each tick mark should represent
    // based on the total time span (spanYa) currently visible
    function getTickStep(spanYa) {
      if (spanYa === 0) return 1;
      const magnitude = Math.pow(10, Math.floor(Math.log10(spanYa)));
      const steps = [0.1, 0.2, 0.25, 0.5, 1, 2, 2.5, 5, 10].map(s => s * magnitude);
      const targetTicks = 8;
      const roughStep = spanYa / targetTicks;
      let bestStep = steps[0];
      for (const s of steps) {
        if (Math.abs(s - roughStep) < Math.abs(bestStep - roughStep)) {
          bestStep = s;
        }
      }
      return bestStep;
    }

    // Convert a "years ago" value into a readable string format (e.g., "1.2 BYA", "500 BCE")
    function formatTickLabel(ya, roundBCE = false) {
      if (ya === 0) return "Today";

      let timeLabel = "";
      if (ya >= 1e9) {
        timeLabel = Number((ya / 1e9).toFixed(2)).toString() + " BYA";
      } else if (ya >= 1e6) {
        timeLabel = Number((ya / 1e6).toFixed(2)).toString() + " MYA";
      } else if (ya >= 1e3) {
        timeLabel = Number((ya / 1e3).toFixed(2)).toString() + " KYA";
      } else {
        timeLabel = ya + " ya";
      }

      if (ya <= 6000 && ya > 0) {
        const currentYear = new Date().getFullYear();
        let y = currentYear - ya;
        let ceLabel = "";
        if (y > 0) {
          ceLabel = y + " CE";
        } else {
          ceLabel = Math.abs(y - 1) + " BCE";
        }

        if (roundBCE) {
          return ceLabel + "<br>(" + timeLabel + ")";
        } else {
          return timeLabel + "<br>(" + ceLabel + ")";
        }
      }

      return timeLabel;
    }

    // Get the usable vertical height of the timeline rail
    function railH() {
      return (document.getElementById('rail-col').offsetHeight || 500) - 28;
    }

    // Map a specific "years ago" value to a vertical pixel position on the rail
    function dotY(ya, startYa, rH) {
      return rH - (ya / startYa) * rH;
    }

    // Build the numbered zoom dots in the header bar
    function buildZoomDots() {
      const container = document.getElementById('zoom-dots');
      LEVELS.forEach((l, i) => {
        const dot = document.createElement('div');
        dot.className = 'zoom-dot';
        dot.textContent = i + 1;
        dot.dataset.level = i;
        // Use the level's color; darken slightly for better contrast with white text
        dot.style.background = l.color;
        // For very light colors, use dark text
        dot.style.color = isLightColor(l.color) ? '#555' : '#fff';
        dot.addEventListener('click', () => {
          currentLevel = i;
          render(currentLevel);
          updateZoomDots();
        });
        container.appendChild(dot);
      });
      updateZoomDots();
    }

    // Determine if a hex color is "light" (for text contrast)
    function isLightColor(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substring(0, 2), 16);
      const g = parseInt(c.substring(2, 4), 16);
      const b = parseInt(c.substring(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.6;
    }

    // Highlight the active dot and update back/forward button states
    function updateZoomDots() {
      const dots = document.querySelectorAll('.zoom-dot');
      dots.forEach((d, i) => {
        d.classList.toggle('active', i === currentLevel);
      });
      const backBtn = document.getElementById('nav-back');
      const fwdBtn = document.getElementById('nav-forward');
      backBtn.classList.toggle('disabled', currentLevel === 0);
      fwdBtn.classList.toggle('disabled', currentLevel === LEVELS.length - 1);
    }

    // Helper function to collect all rendered timeline elements currently in the DOM
    function getItems() {
      const rail = document.getElementById('rail-col');
      const inner = document.getElementById('events-inner');
      const dots = {}, periods = {}, conns = {}, cards = {}, divs = {};
      rail.querySelectorAll('.rail-dot').forEach(el => dots[el.dataset.name] = el);
      rail.querySelectorAll('.rail-period').forEach(el => periods[el.dataset.name] = el);
      rail.querySelectorAll('.conn-line').forEach(el => conns[el.dataset.name] = el);
      inner.querySelectorAll('.event-item').forEach(el => cards[el.dataset.name] = el);
      inner.querySelectorAll('.ev-divider').forEach(el => divs[el.dataset.name] = el);
      return { dots, periods, conns, cards, divs };
    }

    // Main UI update function: Calculates positions, renders elements, and triggers transitions
    function render(levelIdx) {
      const startYa = LEVELS[levelIdx].start_ya;
      const rH = railH();
      const rail = document.getElementById('rail-col');
      const inner = document.getElementById('events-inner');

      // Determine which events/periods should be visible at the current zoom level.
      // An event is visible if its 'years ago' (ya) or end time fits within the current level's start time (startYa).
      const visibleNames = new Set(ALL_EVENTS.filter(e => e.ya <= startYa || (typeof e.end_ya !== 'undefined' && e.end_ya <= startYa)).map(e => e.name));

      // Update the header title with the current level's name and total time span
      document.getElementById('level-name').textContent =
        LEVELS[levelIdx].name + ' · ' + LEVELS[levelIdx].span;

      // --- Update Level Backgrounds ---
      // Scale and position the colored blocks on the timeline rail based on the current zoom level's start and end times.
      LEVELS.forEach((l, i) => {
        const bg = document.getElementById('bg-' + i);
        let tTop = l.start_ya;
        let tBot = i + 1 < LEVELS.length ? LEVELS[i + 1].start_ya : 0;

        let yT = dotY(tTop, startYa, rH);
        let yB = dotY(tBot, startYa, rH);

        let viewYT = Math.max(-5000, Math.min(rH + 5000, yT));
        let viewYB = Math.max(-5000, Math.min(rH + 5000, yB));

        bg.style.top = viewYT + 'px';
        bg.style.height = Math.max(0, viewYB - viewYT) + 'px';
      });

      const { dots, periods, conns, cards, divs } = getItems();
      const SLIDE_MS = 500;
      const FADE_MS = 350;

      // --- TICKS ---
      // Generate the ruler lines/ticks along the left timeline rail. 
      // First, get all existing ticks from the DOM to recycle or remove them.
      const ticks = {};
      rail.querySelectorAll('.rail-tick').forEach(el => ticks[el.dataset.ya] = el);

      // Determine the ideal step size between ticks for the current zoom level
      const step = getTickStep(startYa);
      let targetTicksYa = [];
      let count = 0;
      const currentYear = new Date().getFullYear();

      // Calculate which tick marks are actually needed based on the current zoom level
      if (startYa <= 3500) {
        // Special logic for recent history: align ticks to nice round numbers based on the calendar year
        let startCE = currentYear - startYa;
        let firstVisual = Math.floor(currentYear / step) * step;
        let lastVisual = Math.ceil(startCE / step) * step;

        for (let vYear = firstVisual; vYear >= lastVisual; vYear -= step) {
          let y;
          if (vYear > 0) y = vYear;
          else if (vYear < 0) y = vYear + 1;
          else y = 1;

          y = Number(y.toPrecision(12));
          let ya = Number((currentYear - y).toPrecision(12));

          if (ya <= startYa && ya > 0) targetTicksYa.push(ya);
          if (++count > 50) break;
        }
      } else {
        // General logic for deep history: space ticks evenly based on 'years ago'
        for (let y = Math.floor(startYa / step) * step; y > 0; y -= step) {
          let val = Number(y.toPrecision(12));
          if (val <= startYa && val > 0) targetTicksYa.push(val);
          if (++count > 50) break;
        }
      }
      const visibleTicks = new Set(targetTicksYa.map(String));

      // Hide and mark for removal any existing ticks that are no longer needed
      Object.entries(ticks).forEach(([yaStr, tick]) => {
        if (visibleTicks.has(yaStr)) return;
        tick.style.opacity = '0';
        setTimeout(() => tick.remove(), SLIDE_MS + 50);
      });

      // Render the newly calculated ticks (or update the positions of existing ones)
      targetTicksYa.forEach(ya => {
        const yaStr = String(ya);
        const dy = dotY(ya, startYa, rH);

        if (!ticks[yaStr]) {
          const tick = document.createElement('div');
          tick.className = 'rail-tick';
          tick.dataset.ya = yaStr;
          tick.style.top = dy + 'px';
          tick.style.opacity = '0';

          const lbl = document.createElement('div');
          lbl.className = 'rail-tick-label';
          lbl.innerHTML = formatTickLabel(ya, startYa <= 3500);
          tick.appendChild(lbl);

          rail.appendChild(tick);

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              tick.style.opacity = '1';
            });
          });
        } else {
          ticks[yaStr].style.top = dy + 'px';
          ticks[yaStr].style.opacity = '1';
          ticks[yaStr].querySelector('.rail-tick-label').innerHTML = formatTickLabel(ya, startYa <= 3500);
        }
      });

      // --- EXIT ANIMATIONS ---
      // Handle timeline markers (dots/periods) and their text cards that are scrolling out of the current zoom level's range.
      // Behavior: Slide smoothly to the top of the rail, then fade out and remove from the DOM to free resources.
      [...Object.entries(dots), ...Object.entries(periods)].forEach(([name, dot]) => {
        if (visibleNames.has(name)) return;
        const conn = conns[name];
        const card = cards[name];
        const div = divs[name];

        dot.style.top = '0px';
        if (conn) conn.style.top = '0px';

        setTimeout(() => {
          dot.style.opacity = '0';
          if (conn) conn.style.opacity = '0';
          if (card) card.style.opacity = '0';
        }, SLIDE_MS - FADE_MS);

        setTimeout(() => {
          dot.remove();
          if (conn) conn.remove();
          if (card) card.remove();
          if (div) div.remove();
        }, SLIDE_MS + 50);
      });

      // --- EVENT CARDS PLACEMENT ---
      // Compute the vertical positions for each event's text card.
      // To prevent overlapping text cards, each card is "nudged" down if it collides with the card above it.
      const visible = ALL_EVENTS.filter(e => e.ya <= startYa || (typeof e.end_ya !== 'undefined' && e.end_ya <= startYa));
      const usedY = []; // Keeps track of occupied vertical spaces
      const ITEM_H = 44; // Estimated card height in pixels

      const positions = visible.map(e => {
        const dy = dotY(e.ya, startYa, rH); // Ideal anchor point matching the dot on the rail
        let iy = dy - 14; // Start attempting to place the card slightly above its dot's position

        // Push the card down if its top overlaps with the bottom of any previously placed card
        for (const u of usedY) { if (iy < u + ITEM_H) iy = u + ITEM_H; }
        iy = Math.max(0, iy); // Prevent cards from going off the very top of the screen
        usedY.push(iy);

        return { e, dy, iy }; // e: event data, dy: dot position on rail, iy: card position
      });

      // Expand the scrollable container to fit the lowest positioned card
      inner.style.minHeight = ((usedY[usedY.length - 1] || 0) + 80) + 'px';

      // --- ENTER + UPDATE ANIMATIONS ---
      // Iterate over our newly calculated positions to either update existing elements or create new ones
      positions.forEach(({ e, dy, iy }) => {
        const hasEnd = typeof e.end_ya !== 'undefined';
        const existingEl = hasEnd ? periods[e.name] : dots[e.name];
        const isNew = !existingEl;

        let dyEnd = dy;
        let periodH = 0;
        if (hasEnd) {
          dyEnd = dotY(e.end_ya, startYa, rH);
          periodH = Math.max(2, dyEnd - dy);
        }

        if (isNew) {
          // Create new visual elements (dot/period, connecting line, text card, divider).
          // They are created initially at the top of the rail with 0 opacity, 
          // allowing CSS transitions to slide them into position and fade them in via requestAnimationFrame below.
          const dot = document.createElement('div');
          dot.className = (hasEnd ? 'rail-period ' : 'rail-dot ') + (e.type || 'default');
          if (e.color) dot.style.background = e.color;
          if (hasEnd && typeof e.offset !== 'undefined') dot.style.left = `calc(50% + ${2 + e.offset * 6}px)`;
          dot.style.top = '0px';
          if (hasEnd) dot.style.height = periodH + 'px';
          dot.style.opacity = '0';
          dot.dataset.name = e.name;
          rail.appendChild(dot);

          const conn = document.createElement('div');
          conn.className = 'conn-line';
          conn.style.top = '0px';
          conn.style.opacity = '0';
          conn.dataset.name = e.name;
          rail.appendChild(conn);

          const card = document.createElement('div');
          card.className = 'event-item';
          card.style.top = iy + 'px';
          card.style.opacity = '0';
          card.dataset.name = e.name;
          card.innerHTML = `<div class="ev-time">${e.time}</div><div class="ev-name">${e.name}</div><div class="ev-desc">${e.desc}</div>`;
          inner.appendChild(card);

          const div = document.createElement('div');
          div.className = 'ev-divider';
          div.style.top = (iy + ITEM_H - 2) + 'px';
          div.dataset.name = e.name;
          inner.appendChild(div);

          // Next frame: slide into position and fade in
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              dot.style.top = dy + 'px';
              conn.style.top = dy + 'px';
              dot.style.opacity = '1';
              conn.style.opacity = '1';
              card.style.opacity = '1';
            });
          });
        } else {
          // Existing dot/period: just update position
          existingEl.style.top = dy + 'px';
          if (hasEnd) existingEl.style.height = periodH + 'px';
          if (e.color) existingEl.style.background = e.color;
          if (hasEnd && typeof e.offset !== 'undefined') existingEl.style.left = `calc(50% + ${2 + e.offset * 6}px)`;
          existingEl.style.opacity = '1';
          if (conns[e.name]) { conns[e.name].style.top = dy + 'px'; conns[e.name].style.opacity = '1'; }
          if (cards[e.name]) { cards[e.name].style.top = iy + 'px'; cards[e.name].style.opacity = '1'; }
          if (divs[e.name]) { divs[e.name].style.top = (iy + ITEM_H - 2) + 'px'; }
        }
      });
    }

    buildZoomDots();

    // Create the background color blocks for the timeline rail that signify eras
    function buildLevelBGs() {
      const layer = document.getElementById('level-bg-layer');
      LEVELS.forEach((l, i) => {
        const bg = document.createElement('div');
        bg.className = 'level-bg';
        bg.id = 'bg-' + i;
        bg.style.background = l.color;
        layer.appendChild(bg);
      });
    }
    buildLevelBGs();

    // Back / Forward navigation buttons
    document.getElementById('nav-back').addEventListener('click', () => {
      if (currentLevel > 0) {
        currentLevel--;
        render(currentLevel);
        updateZoomDots();
      }
    });
    document.getElementById('nav-forward').addEventListener('click', () => {
      if (currentLevel < LEVELS.length - 1) {
        currentLevel++;
        render(currentLevel);
        updateZoomDots();
      }
    });

    // --- Drag-to-scrub across zoom dots (mouse + touch) ---
    (function setupDragScrub() {
      const track = document.getElementById('zoom-dots');
      let dragging = false;

      function levelFromPointer(clientX) {
        const dots = track.querySelectorAll('.zoom-dot');
        if (!dots.length) return currentLevel;
        // Find the dot whose center is closest to the pointer
        let best = 0, bestDist = Infinity;
        dots.forEach((d, i) => {
          const rect = d.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const dist = Math.abs(clientX - cx);
          if (dist < bestDist) { bestDist = dist; best = i; }
        });
        return best;
      }

      function applyLevel(clientX) {
        const newLevel = levelFromPointer(clientX);
        if (newLevel !== currentLevel) {
          currentLevel = newLevel;
          render(currentLevel);
          updateZoomDots();
        }
      }

      // Pointer events (covers both mouse and touch)
      track.addEventListener('pointerdown', (e) => {
        dragging = true;
        track.setPointerCapture(e.pointerId);
        applyLevel(e.clientX);
      });

      track.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        applyLevel(e.clientX);
      });

      track.addEventListener('pointerup', (e) => {
        dragging = false;
        track.releasePointerCapture(e.pointerId);
      });

      track.addEventListener('pointercancel', (e) => {
        dragging = false;
      });

      // Prevent default touch behavior (scrolling) while dragging the track
      track.style.touchAction = 'none';
    })();

    // --- Draw connector lines from rail dots/periods to their event cards ---
    // Uses an SVG overlay on the body area. Lines are redrawn whenever
    // the events column is scrolled or the window is resized.
    function drawConnectors() {
      const svg = document.getElementById('connectors-svg');
      const body = document.getElementById('body');
      const eventsCol = document.getElementById('events-col');
      if (!svg || !body || !eventsCol) return;

      const bodyRect = body.getBoundingClientRect();
      // Size the SVG to match the body area
      svg.setAttribute('width', bodyRect.width);
      svg.setAttribute('height', bodyRect.height);

      let paths = '';
      const rail = document.getElementById('rail-col');

      // Iterate over all visible events and draw a line from each rail element to its card
      ALL_EVENTS.forEach(e => {
        const hasEnd = typeof e.end_ya !== 'undefined';
        const railEl = hasEnd
          ? rail.querySelector(`.rail-period[data-name="${CSS.escape(e.name)}"]`)
          : rail.querySelector(`.rail-dot[data-name="${CSS.escape(e.name)}"]`);
        const cardEl = document.querySelector(`.event-item[data-name="${CSS.escape(e.name)}"]`);

        if (!railEl || !cardEl) return;
        // Skip fading-out elements
        if (parseFloat(railEl.style.opacity) === 0 || parseFloat(cardEl.style.opacity) === 0) return;

        const railRect = railEl.getBoundingClientRect();
        const cardRect = cardEl.getBoundingClientRect();

        // Start point: right edge of the rail dot/period, vertically centered
        const x1 = railRect.right - bodyRect.left;
        const y1 = railRect.top + railRect.height / 2 - bodyRect.top;

        // End point: left edge of the card, vertically near the top (at the event name)
        const x2 = cardRect.left - bodyRect.left;
        const y2 = cardRect.top + 14 - bodyRect.top;

        // Skip lines that would go off-screen
        if (y1 < -50 || y1 > bodyRect.height + 50) return;
        if (y2 < -50 || y2 > bodyRect.height + 50) return;

        // Determine the line color based on the event's custom color or type
        let color = 'rgba(0,0,0,0.2)';
        if (e.color) {
          color = e.color;
        } else if (e.type === 'milestone') {
          color = '#ffc86b';
        } else if (e.type === 'epoch') {
          color = '#5dcaa5';
        } else {
          color = '#648cff';
        }

        // Draw a cubic bezier curve for a smooth, organic connector
        const cpx = x1 + (x2 - x1) * 0.5;
        paths += `<path d="M${x1},${y1} C${cpx},${y1} ${cpx},${y2} ${x2},${y2}" stroke="${color}" />`;
      });

      svg.innerHTML = paths;
    }

    // Redraw connectors when events column is scrolled
    document.getElementById('events-col').addEventListener('scroll', drawConnectors);
    // Redraw connectors on window resize
    window.addEventListener('resize', drawConnectors);

    // Patch render() to also redraw connectors after transitions settle
    const _originalRender = render;
    render = function(levelIdx) {
      _originalRender(levelIdx);
      // Draw immediately for a snappy feel, then again after transitions finish
      requestAnimationFrame(() => requestAnimationFrame(drawConnectors));
      setTimeout(drawConnectors, 550);
    };

    setTimeout(() => render(0), 60);
  </script>

</body>
